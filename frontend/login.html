<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GW 건설관리 — 로그인</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;}
  .login-box {
    background: #fff; border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    padding: 32px 28px; width: 100%; max-width: 380px;
  }
  .login-box h1 {
    text-align: center; font-size: 22px; font-weight: 700;
    color: var(--primary); margin-bottom: 4px; letter-spacing: -0.4px;
  }
  .login-box .subtitle {
    text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 24px;
  }
  .login-box label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin: 14px 0 6px;}
  .login-box input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit;
  }
  .login-box input:focus { outline: none; border-color: var(--primary); }
  .login-box .submit {
    width: 100%; padding: 14px; margin-top: 20px; font-size: 15px; font-weight: 700;
    background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer;
    font-family: inherit;
  }
  .login-box .submit:hover { background: var(--primary-dark); }
  .login-box .submit:disabled { opacity: 0.5; cursor: default; }
  .err { background: #fbe9ea; color: #b3373d; padding: 10px 14px;
         border-radius: 8px; font-size: 13px; margin-top: 12px; }
  .links { text-align: center; margin-top: 18px; font-size: 12px; color: var(--text-muted);}
  .links a { color: var(--primary); text-decoration: none; margin: 0 6px;}
</style>
</head>
<body>

<div class="login-box">
  <h1>GW 건설관리</h1>
  <div class="subtitle">본사 관리자 로그인</div>

  <label for="f-user">아이디</label>
  <input id="f-user" type="text" autocomplete="username" placeholder="admin">

  <label for="f-pw">비밀번호</label>
  <input id="f-pw" type="password" autocomplete="current-password">

  <button class="submit" id="btn">로그인</button>

  <div id="err-box"></div>

  <div class="links">
    <a href="/register">신규 직원 가입</a> ·
    <a href="/m">출퇴근 화면</a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

async function doLogin() {
  const username = $('f-user').value.trim();
  const password = $('f-pw').value;
  if (!username || !password) {
    $('err-box').innerHTML = '<div class="err">아이디와 비밀번호를 입력해주세요.</div>';
    return;
  }
  $('btn').disabled = true; $('btn').textContent = '확인 중…';
  $('err-box').innerHTML = '';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await r.json();
    if (!r.ok) {
      $('err-box').innerHTML = '<div class="err">' + (data.detail || '로그인 실패') + '</div>';
      $('btn').disabled = false; $('btn').textContent = '로그인';
      return;
    }
    // 성공 — 본사 화면으로
    location.href = '/';
  } catch (e) {
    $('err-box').innerHTML = '<div class="err">서버 통신 실패: ' + e + '</div>';
    $('btn').disabled = false; $('btn').textContent = '로그인';
  }
}

$('btn').onclick = doLogin;
$('f-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('f-user').addEventListener('keydown', e => { if (e.key === 'Enter') $('f-pw').focus(); });

// 이미 로그인 상태면 바로 / 로
fetch('/api/me').then(r => r.json()).then(d => {
  if (d.authenticated) location.href = '/';
});

// 자동 포커스
$('f-user').focus();
</script>
</body>
</html>
