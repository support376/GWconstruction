<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GW 건설관리 — 관리자 가입</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;}
  .signup-box {
    background: #fff; border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    padding: 32px 28px; width: 100%; max-width: 420px;
  }
  .signup-box h1 {
    text-align: center; font-size: 22px; font-weight: 700;
    color: var(--primary); margin-bottom: 4px; letter-spacing: -0.4px;
  }
  .signup-box .subtitle {
    text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 24px;
  }
  .signup-box label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin: 14px 0 6px;}
  .signup-box .helper { font-size: 11px; color: var(--text-muted); margin-top: 4px;}
  .signup-box input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit;
  }
  .signup-box input:focus { outline: none; border-color: var(--primary); }
  .signup-box .submit {
    width: 100%; padding: 14px; margin-top: 20px; font-size: 15px; font-weight: 700;
    background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer;
    font-family: inherit;
  }
  .signup-box .submit:hover { background: var(--primary-dark); }
  .signup-box .submit:disabled { opacity: 0.5; cursor: default; }
  .err { background: #fbe9ea; color: #b3373d; padding: 10px 14px;
         border-radius: 8px; font-size: 13px; margin-top: 12px; }
  .links { text-align: center; margin-top: 18px; font-size: 12px; color: var(--text-muted);}
  .links a { color: var(--primary); text-decoration: none;}
</style>
</head>
<body>

<div class="signup-box">
  <h1>관리자 가입</h1>
  <div class="subtitle">본사 직원 — 가입하면 즉시 사용 가능</div>

  <label>이름 *</label>
  <input id="f-name" type="text" placeholder="홍길동">

  <label>아이디 *</label>
  <input id="f-user" type="text" placeholder="hong" autocomplete="username" autocapitalize="none">
  <div class="helper">3자 이상, 영문·숫자만</div>

  <label>비밀번호 *</label>
  <input id="f-pw" type="password" autocomplete="new-password">
  <div class="helper">6자 이상</div>

  <div id="invite-row" style="display:none">
    <label>초대 코드 *</label>
    <input id="f-invite" type="text" placeholder="본사에서 받은 코드">
    <div class="helper">대표/관리자에게 받은 코드를 입력하세요.</div>
  </div>

  <button class="submit" id="btn">가입하고 시작하기</button>

  <div id="err-box"></div>

  <div class="links">
    이미 계정 있으면 → <a href="/login">로그인</a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

(async () => {
  const cfg = await fetch('/api/signup-config').then(r => r.json());
  if (cfg.invite_required) $('invite-row').style.display = 'block';
})();

async function doSignup() {
  const name = $('f-name').value.trim();
  const username = $('f-user').value.trim().toLowerCase();
  const password = $('f-pw').value;
  const invite_code = $('f-invite').value.trim();

  if (!name) { $('err-box').innerHTML = '<div class="err">이름을 입력해주세요.</div>'; return; }
  if (username.length < 3) { $('err-box').innerHTML = '<div class="err">아이디는 3자 이상이어야 합니다.</div>'; return; }
  if (password.length < 6) { $('err-box').innerHTML = '<div class="err">비밀번호는 6자 이상이어야 합니다.</div>'; return; }

  $('btn').disabled = true; $('btn').textContent = '가입 중…';
  $('err-box').innerHTML = '';

  try {
    const r = await fetch('/api/signup', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password, name, invite_code })
    });
    const data = await r.json();
    if (!r.ok) {
      $('err-box').innerHTML = '<div class="err">' + (data.detail || '가입 실패') + '</div>';
      $('btn').disabled = false; $('btn').textContent = '가입하고 시작하기';
      return;
    }
    // 즉시 로그인 처리됨 → 본사 화면으로
    location.href = '/';
  } catch (e) {
    $('err-box').innerHTML = '<div class="err">서버 통신 실패: ' + e + '</div>';
    $('btn').disabled = false; $('btn').textContent = '가입하고 시작하기';
  }
}

$('btn').onclick = doSignup;
$('f-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });

$('f-name').focus();
</script>
</body>
</html>
