<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GW 건설관리 시스템</title>
<link rel="stylesheet" href="/static/styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <span class="logo">GW</span>
    <div>
      <div class="title">건설관리</div>
      <div class="sub" id="sb-now"></div>
    </div>
  </div>

  <nav class="sb-nav">
    <div class="sb-section">🌅 시작</div>
    <a class="sb-item" href="#/morning">아침 요약</a>
    <a class="sb-item" href="#/inbox">
      <span>📬 알림</span>
      <span id="notif-badge" class="sb-badge" style="display:none"></span>
    </a>
    <a class="sb-item" href="#/admin-board">행정 대시보드</a>

    <div class="sb-section">📋 행정 마스터</div>
    <a class="sb-item" href="#/workers">👷 직원 관리</a>
    <a class="sb-item" href="#/companies">🏢 법인</a>
    <a class="sb-item" href="#/licenses">📜 면허</a>
    <a class="sb-item" href="#/reference">📚 기본 정보 (면허·자격증)</a>

    <div class="sb-section">💰 급여·노무</div>
    <a class="sb-item" href="#/payroll/grid">📅 출역 매트릭스</a>
    <a class="sb-item" href="#/payroll/monthly">📋 월별 명세서</a>
    <a class="sb-item" href="#/payroll/report">📑 신고 분류</a>
    <a class="sb-item" href="#/payroll/rates">💵 단가·공제율</a>
    <a class="sb-item" href="#/payroll/vendors">🏗 협력사·특고직</a>
    <a class="sb-item" href="#/payroll/dashboard">📊 노무비 추이</a>

    <div class="sb-section">⚙️ 관리</div>
    <a class="sb-item admin-only" href="#/users" id="nav-users" style="display:none">사용자</a>

    <!-- 접힌 그룹들 — 클릭하면 펼쳐짐 -->
    <div class="sb-section sb-collapsible" data-group="bidding">
      <span>📑 입찰 (나라장터)</span><span class="sb-arrow">▸</span>
    </div>
    <div class="sb-group" data-group="bidding" style="display:none">
      <a class="sb-item" href="#/procurement">공고 분석</a>
      <a class="sb-item" href="#/my-bids">우리 입찰</a>
      <a class="sb-item" href="#/competitors">경쟁사</a>
    </div>

    <div class="sb-section sb-collapsible" data-group="field">
      <span>🏗 현장 운영</span><span class="sb-arrow">▸</span>
    </div>
    <div class="sb-group" data-group="field" style="display:none">
      <a class="sb-item" href="#/ops">운영 대시보드</a>
      <a class="sb-item" href="#/board-week">주간 계획</a>
      <a class="sb-item" href="#/board">오늘 배치</a>
      <a class="sb-item" href="#/sites">현장</a>
      <a class="sb-item" href="#/map">현장 지도</a>
      <a class="sb-item" href="#/vehicles">차량·자원</a>
      <a class="sb-item" href="#/projects">프로젝트 손익</a>
      <a class="sb-item" href="#/finance-board">재무 대시보드</a>
    </div>
  </nav>

  <div class="sb-foot">
    <div class="sb-share">
      <div class="lbl">🔗 공유 링크</div>
      <a href="/m" target="_blank">📱 폰 출퇴근 (직원용) ↗</a>
      <a href="/register" target="_blank">✍️ 신규 직원 가입 ↗</a>
    </div>
    <div class="sb-user" id="sb-user">
      <div class="avatar">?</div>
      <div class="info">
        <div class="name">로딩…</div>
        <div class="role">—</div>
      </div>
      <a href="#" class="logout" onclick="logout(); return false;" title="로그아웃">⏻</a>
    </div>
  </div>

  <button class="sb-toggle" id="sb-toggle" title="사이드바 토글">☰</button>
</aside>

<main class="main">
  <div id="app" class="page"></div>
</main>

<div id="modal-root"></div>

<script src="/static/app.js"></script>
</body>
</html>
