# Render 배포 설정 (https://render.com)
services:
  - type: web
    name: gw-construction-mgmt
    runtime: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true        # Render가 자동으로 강한 랜덤값 생성
      - key: ADMIN_PASSWORD
        sync: false                # Render 대시보드에서 직접 입력 (Git에 안 올라감)
      # ----- 영구 디스크로 SQLite 보존하려면 (월 $1, 1GB) 주석 해제 -----
      # - key: DB_PATH
      #   value: /var/data/construction.db
# disk:
#   name: data
#   mountPath: /var/data
#   sizeGB: 1
